services:
  db:
    image: postgres:16
    container_name: payments_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB__NAME}
      POSTGRES_USER: ${DB__USER}
      POSTGRES_PASSWORD: ${DB__PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: payments_app
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env.example
    environment:
      DB__HOST: db
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  postgres_data: